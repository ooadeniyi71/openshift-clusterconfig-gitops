dependencies:
  - name: tpl
    version: ~1.0.0
    repository: https://charts.stderr.at/
  - name: helper-operator
    version: ~1.0.18
    repository: https://charts.stderr.at/
  - name: helper-status-checker
    version: ~4.0.0
    repository: https://charts.stderr.at/
    condition: helper-status-checker.enabled
  - name: rh-build-of-opentelemetry
    version: ~1.0.0
    repository: https://charts.stderr.at/
    condition: rh-build-of-opentelemetry.enabled
maintainers:
